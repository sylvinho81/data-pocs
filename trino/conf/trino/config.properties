coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
# Must be a valid URI host (no underscores). Use service name so it resolves on the Docker network.
discovery.uri=http://trino:8080

# POC: allow larger queries (e.g. loading Iceberg from raw parquet)
query.max-memory=6GB
query.max-memory-per-node=2GB
memory.heap-headroom-per-node=512MB

